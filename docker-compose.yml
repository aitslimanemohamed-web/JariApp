services:
  postgres:
    image: postgres:16-alpine
    container_name: jariapp-postgres
    environment:
      POSTGRES_USER: jariapp
      POSTGRES_PASSWORD: jariapp_dev
      POSTGRES_DB: jariapp
    ports:
      - "5433:5432"
    volumes:
      - jariapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jariapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jariapp_pgdata:
